    <text x="1" y="36" fill="#97a287" font-size="10" font-weight="500" letter-spacing="3.8" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">COLLECTIVE</text>
  </g>
</svg>
