<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 388 68" role="img" aria-labelledby="title desc">
  <title id="title">UP IN SMOKE COLLECTIVE logo</title>
  <desc id="desc">UISC icon with UP IN SMOKE COLLECTIVE wordmark and green smoke symbol.</desc>
  <defs>
    <linearGradient id="smokeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6dfcf"/>
      <stop offset="55%" stop-color="#8b9678"/>
      <stop offset="100%" stop-color="#5f6753"/>
    </linearGradient>
  </defs>

  <g transform="translate(0 0)">
    <rect x="0" y="0" width="68" height="68" rx="20" fill="#121212" stroke="#2b2d28"/>
    <path d="M14 44c8-12 30-5 39-17-3 10-12 13-21 14-5 1-10 1-18 3Z" fill="url(#smokeGrad)" opacity="0.78"/>
    <path d="M16 32c6-9 16-8 23-14 0 5-4 9-8 11-6 4-10 2-15 3Z" fill="url(#smokeGrad)" opacity="0.62"/>
    <path d="M20 49h28" stroke="#d9d2c4" stroke-linecap="round" opacity="0.6"/>
  </g>

  <g transform="translate(84 14)">
